services:
  - type: web
    name: gote-drink-sales
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
